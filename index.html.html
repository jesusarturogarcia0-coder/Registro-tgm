<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Registro de Externos | The Gund Company México</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #002855;
  --blue-light: #003a7a;
  --orange: #E8A33D;
  --orange-light: #f0b85e;
  --gray: #e4e4e5;
  --gray-dark: #6b7280;
  --bg: #f7f8fa;
  --white: #ffffff;
  --success: #16a34a;
  --error: #dc2626;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:#1e293b; min-height:100vh; line-height:1.6; }
.montserrat { font-family:'Montserrat',sans-serif; }

/* Header */
.header { background:var(--blue); position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,40,85,0.3); }
.header-inner { max-width:900px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:14px; }
.logo-circle { width:44px; height:44px; background:var(--white); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.2); flex-shrink:0; }
.logo-circle span { font-family:'Montserrat',sans-serif; font-weight:800; font-size:14px; color:var(--blue); }
.header-title { font-family:'Montserrat',sans-serif; font-weight:800; font-size:15px; color:var(--white); letter-spacing:0.3px; }
.header-sub { font-size:11px; color:var(--orange); font-style:italic; font-weight:500; }
.nav-btns { display:flex; gap:6px; }
.nav-btn { padding:8px 16px; border-radius:8px; border:none; cursor:pointer; font-family:'Montserrat',sans-serif; font-weight:700; font-size:12px; transition:all 0.2s; position:relative; }
.nav-btn.active { background:var(--orange); color:var(--white); }
.nav-btn:not(.active) { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); }
.badge { position:absolute; top:-6px; right:-6px; background:var(--error); color:var(--white); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }

/* Card */
.card { background:var(--white); border-radius:10px; box-shadow:0 4px 24px rgba(0,40,85,0.08); padding:28px; margin-bottom:20px; animation:fadeUp 0.35s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.card-title { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.card-title .icon { width:28px; height:28px; background:var(--orange); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.card-title span { font-family:'Montserrat',sans-serif; font-weight:700; font-size:18px; color:var(--blue); }
.card-subtitle { font-size:14px; color:var(--gray-dark); margin-bottom:20px; }

/* Progress */
.progress-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; position:relative; padding:0 10px; }
.progress-track { position:absolute; top:16px; left:46px; right:46px; height:3px; background:var(--gray); z-index:0; }
.progress-fill { position:absolute; top:16px; left:46px; height:3px; background:var(--orange); z-index:1; transition:width 0.5s; }
.step-wrapper { display:flex; flex-direction:column; align-items:center; z-index:2; }
.step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Montserrat',sans-serif; font-weight:700; font-size:13px; transition:all 0.3s; }
.step-dot.future { background:var(--gray); color:var(--gray-dark); }
.step-dot.current { background:var(--orange); color:var(--white); box-shadow:0 0 0 4px rgba(232,163,61,0.25); }
.step-dot.done { background:var(--blue); color:var(--white); }
.step-label { font-size:10px; font-weight:600; color:var(--gray-dark); margin-top:4px; }

/* Form */
.container { max-width:900px; margin:0 auto; padding:20px 20px 40px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:600px) { .form-row { grid-template-columns:1fr; } }
.form-group { margin-bottom:14px; }
label.field-label { display:block; font-weight:600; font-size:13px; color:var(--blue); margin-bottom:5px; }
label.field-label .req { color:var(--error); margin-left:2px; }
input[type="text"],input[type="email"],input[type="tel"],input[type="date"],select,textarea {
  width:100%; padding:10px 12px; border:2px solid var(--gray); border-radius:8px;
  font-family:'DM Sans',sans-serif; font-size:14px; color:#1e293b; outline:none;
  transition:border-color 0.2s; background:var(--white);
}
input:focus,select:focus,textarea:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(232,163,61,0.15); }
textarea { resize:vertical; min-height:70px; }

/* Type selector */
.type-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:500px) { .type-grid { grid-template-columns:1fr; } }
.type-option { border:2px solid var(--gray); border-radius:10px; padding:16px 10px; text-align:center; cursor:pointer; transition:all 0.2s; }
.type-option:hover { border-color:var(--orange-light); background:#fffbf5; }
.type-option.selected { border-color:var(--orange); background:#fff8ed; box-shadow:0 0 0 3px rgba(232,163,61,0.15); }
.type-icon { font-size:28px; margin-bottom:4px; }
.type-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:12px; color:var(--blue); }
.type-vest { font-size:11px; color:var(--gray-dark); margin-top:4px; display:flex; align-items:center; justify-content:center; gap:4px; }
.vest-dot { width:10px; height:10px; border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,0.15); }

/* File upload */
.file-upload { border:2px dashed var(--gray); border-radius:8px; padding:16px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
.file-upload:hover { border-color:var(--orange); background:#fffbf5; }
.file-upload.has-file { border-color:var(--success); background:#f0fdf4; }
.file-upload input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* Buttons */
.btn { font-family:'Montserrat',sans-serif; font-weight:700; font-size:13px; padding:10px 22px; border-radius:8px; border:none; cursor:pointer; transition:all 0.2s; letter-spacing:0.3px; }
.btn-primary { background:var(--orange); color:var(--white); box-shadow:0 4px 12px rgba(232,163,61,0.3); }
.btn-primary:hover { background:#d4922e; transform:translateY(-1px); }
.btn-primary:disabled { background:var(--gray); opacity:0.5; transform:none; box-shadow:none; cursor:default; }
.btn-secondary { background:var(--white); color:var(--blue); border:2px solid var(--gray); }
.btn-secondary:hover { border-color:var(--blue); }
.btn-submit { background:var(--blue); color:var(--white); width:100%; padding:14px; font-size:15px; box-shadow:0 4px 12px rgba(0,40,85,0.3); }
.btn-submit:hover { background:var(--blue-light); transform:translateY(-1px); }
.btn-submit:disabled { background:var(--gray); opacity:0.5; transform:none; box-shadow:none; cursor:default; }
.btn-row { display:flex; justify-content:space-between; margin-top:20px; gap:12px; }

/* Info/Warning boxes */
.info-box { background:#eff6ff; border-left:4px solid var(--blue); border-radius:0 8px 8px 0; padding:12px 14px; font-size:13px; color:var(--blue); margin-bottom:16px; }
.warning-box { background:#fef3c7; border-left:4px solid var(--orange); border-radius:0 8px 8px 0; padding:12px 14px; font-size:13px; color:#92400e; margin-bottom:16px; }

/* Checkbox */
.checkbox-group { display:flex; align-items:flex-start; gap:10px; padding:14px; border:2px solid var(--gray); border-radius:8px; cursor:pointer; transition:all 0.2s; margin-bottom:14px; }
.checkbox-group:hover { border-color:var(--orange-light); }
.checkbox-group.checked { border-color:var(--orange); background:#fff8ed; }
.checkbox-group input[type="checkbox"] { width:20px; height:20px; accent-color:var(--orange); flex-shrink:0; margin-top:2px; }
.checkbox-group span { font-size:13px; line-height:1.5; }

/* EPP */
.epp-list { background:#f8fafc; border-radius:8px; padding:16px 20px; margin-bottom:16px; }
.epp-title { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:8px; }
.epp-item { font-size:13px; color:#475569; padding:3px 0 3px 18px; position:relative; }
.epp-item::before { content:'✓'; position:absolute; left:0; color:var(--success); font-weight:700; }

/* Prohibited */
.prohibited { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.prohibited-tag { background:#fee2e2; color:#991b1b; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }

/* Summary */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px; background:#f8fafc; border-radius:8px; padding:16px; margin-bottom:16px; }
.summary-item strong { color:var(--blue); }
.summary-full { grid-column:1/-1; }

/* Admin stats */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:600px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
.stat-card { border-radius:10px; padding:14px 16px; text-align:center; }
.stat-value { font-family:'Montserrat',sans-serif; font-weight:800; font-size:28px; }
.stat-label { font-size:12px; font-weight:600; opacity:0.8; }

/* Admin filters */
.filter-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:6px 14px; border-radius:20px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:600; font-size:12px; transition:all 0.2s; }
.filter-btn.active { background:var(--blue); color:var(--white); }
.filter-btn:not(.active) { background:var(--gray); color:var(--gray-dark); }
.search-input { flex:1; min-width:180px; font-size:13px; padding:6px 12px; }

/* Registro card */
.reg-card { border:2px solid var(--gray); border-radius:10px; overflow:hidden; transition:all 0.2s; margin-bottom:10px; }
.reg-card.expanded { border-color:var(--orange); }
.reg-header { display:flex; align-items:center; padding:12px 16px; cursor:pointer; gap:12px; transition:all 0.2s; }
.reg-card.expanded .reg-header { background:#fffbf5; }
.reg-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:14px; color:var(--blue); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.reg-meta { font-size:12px; color:var(--gray-dark); }
.status-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap; }
.arrow { font-size:14px; color:var(--gray-dark); transition:transform 0.2s; }
.reg-card.expanded .arrow { transform:rotate(180deg); }
.reg-details { padding:0 16px 16px; border-top:1px solid var(--gray); }
.action-btns { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.action-btn { font-family:'Montserrat',sans-serif; font-weight:700; font-size:12px; padding:7px 14px; border-radius:8px; border:none; cursor:pointer; transition:all 0.2s; }

/* Success */
.success-icon { width:72px; height:72px; background:#dcfce7; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:36px; animation:popIn 0.5s ease; }
@keyframes popIn { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
.ref-number { background:var(--blue); color:var(--white); font-family:'Montserrat',sans-serif; font-weight:700; padding:10px 24px; border-radius:8px; display:inline-block; margin:16px 0; font-size:20px; letter-spacing:1px; }

/* Footer */
.footer { text-align:center; padding:20px; font-size:12px; color:var(--gray-dark); }
.footer strong { color:var(--blue); }

/* Empty state */
.empty { text-align:center; padding:40px; color:var(--gray-dark); }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── State ──────────────────────────────────────────────────────
const state = {
  view: 'form',
  step: 1,
  tipo: '',
  form: { nombre:'', empresa:'', correo:'', telefono:'', fechaVisita: new Date().toISOString().split('T')[0], contactoTGM:'', motivo:'', tipoID:'', esExtranjero:false, altoRiesgo:false, herramientas:'' },
  files: {},
  submitted: false,
  refNum: '',
  accepted: false,
  registros: [],
  filter: 'todos',
  search: '',
  expanded: null
};

const STORAGE_KEY = 'tgm-registros';
const VEST = {
  visitante: { label:'Visitante', color:'#facc15', name:'Amarillo', icon:'🏢' },
  contratista: { label:'Contratista / Proveedor', color:'#22c55e', name:'Verde', icon:'🔧' },
  transportista: { label:'Transportista', color:'#f97316', name:'Anaranjado', icon:'🚛' }
};
const EPP = ['Botas industriales con casquillo (NOM-113-STPS)','Tapones o conchas auditivas 27 NRR','Lentes de seguridad','Mascarilla N95'];
const PROHIB = ['Short','Bermudas','Ropa holgada','Ropa desgarrada','Joyería','Alcohol / estupefacientes'];
const STATUS = {
  pendiente: { bg:'#fef3c7', text:'#92400e', label:'Pendiente' },
  aprobado: { bg:'#dcfce7', text:'#166534', label:'Aprobado' },
  rechazado: { bg:'#fee2e2', text:'#991b1b', label:'Rechazado' }
};

// ─── ADMIN PASSWORD ─────────────────────────────────────────────
// ⚠️ CAMBIA ESTA CONTRASEÑA antes de subir a producción
const ADMIN_PASSWORD = 'TGM-EHS-2024';
const AUTH_KEY = 'tgm-admin-auth';
// Session auth (lasts until browser is closed)
try { state.adminAuth = sessionStorage.getItem(AUTH_KEY) === 'true'; } catch(e) { state.adminAuth = false; }
state.loginError = false;
state.loginPassword = '';

// Load from localStorage
try { state.registros = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { state.registros = []; }

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.registros)); } catch(e) {}
}

function render() {
  const app = document.getElementById('app');
  const pending = state.registros.filter(r => r.status === 'pendiente').length;

  app.innerHTML = `
    <div class="header">
      <div class="header-inner">
        <div class="header-left">
          <div class="logo-circle"><span>TGC</span></div>
          <div>
            <div class="header-title">The Gund Company México</div>
            <div class="header-sub">Registro de Externos — MEX-SOP-108-009</div>
          </div>
        </div>
        <div class="nav-btns">
          <button class="nav-btn ${state.view==='form'?'active':''}" onclick="switchView('form')">📋 Formulario</button>
          <button class="nav-btn ${state.view==='admin'?'active':''}" onclick="switchView('admin')">🔒 Admin${pending>0?`<span class="badge">${pending}</span>`:''}</button>
        </div>
      </div>
    </div>
    <div class="container">
      ${state.view === 'form' ? renderForm() : (state.adminAuth ? renderAdmin() : renderLogin())}
    </div>
    <div class="footer">
      <strong>The Gund Company México</strong> S. de R.L. de C.V. — El Marqués, Querétaro<br>
      Parque Industrial Tecnológico Innovación | EHS Department
    </div>
  `;
}

function switchView(v) { state.view = v; render(); window.scrollTo({top:0,behavior:'smooth'}); }

// ─── LOGIN ──────────────────────────────────────────────────────
function renderLogin() {
  return `<div class="card" style="max-width:420px;margin:40px auto;text-align:center">
    <div style="width:64px;height:64px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <span style="font-size:28px">🔒</span>
    </div>
    <h2 class="montserrat" style="font-size:20px;color:var(--blue);margin-bottom:6px">Panel de Administración</h2>
    <p style="font-size:14px;color:var(--gray-dark);margin-bottom:24px">Ingresa la contraseña para acceder.</p>
    ${state.loginError?'<div style="background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px">❌ Contraseña incorrecta. Intenta de nuevo.</div>':''}
    <div style="margin-bottom:16px;text-align:left">
      <label class="field-label">Contraseña <span class="req">*</span></label>
      <input type="password" id="adminPwdInput" placeholder="Ingresa la contraseña" style="width:100%;padding:12px;border:2px solid ${state.loginError?'var(--error)':'var(--gray)'};border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none" onkeydown="if(event.key==='Enter')loginAdmin()" oninput="state.loginError=false">
    </div>
    <button class="btn btn-submit" onclick="loginAdmin()">Ingresar</button>
    <p style="font-size:11px;color:var(--gray-dark);margin-top:16px">Acceso exclusivo para personal EHS de TGM.</p>
  </div>`;
}

function loginAdmin() {
  const input = document.getElementById('adminPwdInput');
  if (input && input.value === ADMIN_PASSWORD) {
    state.adminAuth = true;
    state.loginError = false;
    try { sessionStorage.setItem(AUTH_KEY, 'true'); } catch(e) {}
    render();
  } else {
    state.loginError = true;
    render();
    const inp = document.getElementById('adminPwdInput');
    if(inp) inp.focus();
  }
}

function logoutAdmin() {
  state.adminAuth = false;
  state.loginError = false;
  try { sessionStorage.removeItem(AUTH_KEY); } catch(e) {}
  state.view = 'form';
  render();
}

// ─── FORM ───────────────────────────────────────────────────────
function renderForm() {
  if (state.submitted) return renderSuccess();
  return renderProgress() + `<div class="card">${
    state.step===1 ? renderStep1() :
    state.step===2 ? renderStep2() :
    state.step===3 ? renderStep3() :
    renderStep4()
  }</div>`;
}

function renderProgress() {
  const labels = ['Tipo','Datos','Docs','Firma'];
  const pct = ((state.step - 1) / 3) * 88;
  return `<div class="progress-bar">
    <div class="progress-track"></div>
    <div class="progress-fill" style="width:${pct}%"></div>
    ${labels.map((l,i) => `<div class="step-wrapper">
      <div class="step-dot ${i+1<state.step?'done':i+1===state.step?'current':'future'}">${i+1<state.step?'✓':i+1}</div>
      <div class="step-label">${l}</div>
    </div>`).join('')}
  </div>`;
}

function renderStep1() {
  return `
    <div class="card-title"><div class="icon">👤</div><span>Tipo de Visitante</span></div>
    <p class="card-subtitle">Selecciona el tipo de persona que ingresará a TGM.</p>
    <div class="type-grid">
      ${Object.entries(VEST).map(([k,v]) => `
        <div class="type-option ${state.tipo===k?'selected':''}" onclick="selectType('${k}')">
          <div class="type-icon">${v.icon}</div>
          <div class="type-name">${v.label}</div>
          <div class="type-vest"><span class="vest-dot" style="background:${v.color}"></span>Chaleco ${v.name.toLowerCase()}</div>
        </div>
      `).join('')}
    </div>
    <div class="info-box">📋 <strong>Documento de referencia:</strong> MEX-SOP-108-009 Rev. 2 (21/oct/2024)</div>
    <div style="display:flex;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-primary" ${state.tipo?'':'disabled'} onclick="goStep(2)">Siguiente →</button>
    </div>`;
}

function renderStep2() {
  const f = state.form;
  return `
    <div class="card-title"><div class="icon">📝</div><span>Datos del Visitante</span></div>
    <p class="card-subtitle">Información personal y de contacto.</p>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Nombre completo <span class="req">*</span></label>
        <input type="text" value="${esc(f.nombre)}" oninput="setField('nombre',this.value)" placeholder="Nombre y apellidos">
      </div>
      <div class="form-group">
        <label class="field-label">Empresa / Organización <span class="req">*</span></label>
        <input type="text" value="${esc(f.empresa)}" oninput="setField('empresa',this.value)" placeholder="Nombre de la empresa">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Correo electrónico <span class="req">*</span></label>
        <input type="email" value="${esc(f.correo)}" oninput="setField('correo',this.value)" placeholder="correo@ejemplo.com">
      </div>
      <div class="form-group">
        <label class="field-label">Teléfono</label>
        <input type="tel" value="${esc(f.telefono)}" oninput="setField('telefono',this.value)" placeholder="(442) 123 4567">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Fecha de visita <span class="req">*</span></label>
        <input type="date" value="${f.fechaVisita}" oninput="setField('fechaVisita',this.value)" min="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label class="field-label">Contacto de TGM <span class="req">*</span></label>
        <input type="text" value="${esc(f.contactoTGM)}" oninput="setField('contactoTGM',this.value)" placeholder="Nombre del contacto interno">
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">Motivo de la visita <span class="req">*</span></label>
      <textarea oninput="setField('motivo',this.value)" placeholder="Describe brevemente el motivo...">${esc(f.motivo)}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Tipo de identificación <span class="req">*</span></label>
        <select onchange="setField('tipoID',this.value)">
          <option value="" ${f.tipoID===''?'selected':''}>Selecciona...</option>
          <option value="ine" ${f.tipoID==='ine'?'selected':''}>Credencial para votar (INE)</option>
          <option value="pasaporte" ${f.tipoID==='pasaporte'?'selected':''}>Pasaporte vigente</option>
        </select>
      </div>
      <div class="form-group">
        <label class="field-label">¿Es extranjero?</label>
        <select onchange="setField('esExtranjero',this.value==='si')">
          <option value="no" ${!f.esExtranjero?'selected':''}>No</option>
          <option value="si" ${f.esExtranjero?'selected':''}>Sí</option>
        </select>
      </div>
    </div>
    ${state.tipo==='contratista'?`
    <div class="form-group">
      <label class="field-label">¿Realizará trabajos de alto riesgo?</label>
      <select onchange="setField('altoRiesgo',this.value==='si')">
        <option value="no" ${!f.altoRiesgo?'selected':''}>No</option>
        <option value="si" ${f.altoRiesgo?'selected':''}>Sí (altura, espacios confinados, eléctricos, soldadura, etc.)</option>
      </select>
    </div>`:''}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(1)">← Atrás</button>
      <button class="btn btn-primary" onclick="goStep(3)">Siguiente →</button>
    </div>`;
}

function renderStep3() {
  const f = state.form;
  return `
    <div class="card-title"><div class="icon">📂</div><span>Documentación</span></div>
    <p class="card-subtitle">Sube los documentos requeridos.</p>
    <div class="warning-box">⚠️ <strong>Obligatorio:</strong> Sin documentación completa no se autorizará el ingreso.</div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Registro vigente IMSS (SUA) <span class="req">*</span></label>
        ${fileUploadHTML('sua')}
      </div>
      <div class="form-group">
        <label class="field-label">Pago del registro vigente (SUA) <span class="req">*</span></label>
        ${fileUploadHTML('pago')}
      </div>
    </div>
    ${f.esExtranjero?`
    <div class="form-group">
      <label class="field-label">Carátula de Seguro de Gastos Médicos Mayores (SGMM) <span class="req">*</span></label>
      ${fileUploadHTML('sgmm')}
    </div>`:''}
    ${state.tipo==='contratista'&&f.altoRiesgo?`
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Constancia DC-3 (no mayor a 1 año) <span class="req">*</span></label>
        ${fileUploadHTML('dc3')}
      </div>
      <div class="form-group">
        <label class="field-label">Descripción de actividad firmada <span class="req">*</span></label>
        ${fileUploadHTML('descAct')}
      </div>
    </div>`:''}
    ${state.tipo!=='transportista'?`
    <div class="form-group" style="margin-top:16px">
      <label class="field-label">¿Ingresará herramientas, equipo o materiales?</label>
      <textarea oninput="setField('herramientas',this.value)" placeholder="Si aplica, lista los equipos (ej: Taladro x1, Multímetro x2)...">${esc(f.herramientas)}</textarea>
    </div>`:''}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(2)">← Atrás</button>
      <button class="btn btn-primary" onclick="goStep(4)">Siguiente →</button>
    </div>`;
}

function renderStep4() {
  const f = state.form;
  const v = VEST[state.tipo];
  return `
    <div class="card-title"><div class="icon">✅</div><span>Confirmación y Firma</span></div>
    <p class="card-subtitle">Revisa tu información y acepta las condiciones.</p>
    <div class="summary-grid">
      <div class="summary-item"><strong>Nombre:</strong> ${esc(f.nombre)||'—'}</div>
      <div class="summary-item"><strong>Empresa:</strong> ${esc(f.empresa)||'—'}</div>
      <div class="summary-item"><strong>Tipo:</strong> ${v?.label||'—'}</div>
      <div class="summary-item"><strong>Fecha:</strong> ${f.fechaVisita||'—'}</div>
      <div class="summary-item"><strong>Contacto TGM:</strong> ${esc(f.contactoTGM)||'—'}</div>
      <div class="summary-item"><strong>Chaleco:</strong> ${v?.name||'—'}</div>
      <div class="summary-item summary-full"><strong>Motivo:</strong> ${esc(f.motivo)||'—'}</div>
      ${f.herramientas?`<div class="summary-item summary-full"><strong>Herramientas:</strong> ${esc(f.herramientas)}</div>`:''}
    </div>
    <div class="epp-list">
      <div class="epp-title">🦺 EPP Requerido</div>
      ${EPP.map(e=>`<div class="epp-item">${e}</div>`).join('')}
      <div class="epp-item">Chaleco antirreflejante color ${v?.name?.toLowerCase()||''}</div>
      ${state.tipo==='transportista'?'<div style="font-size:12px;color:var(--gray-dark);margin-top:6px;font-style:italic">Nota: tapones, lentes y mascarilla solo si ingresa a áreas productivas.</div>':''}
    </div>
    <div style="margin-bottom:16px">
      <div class="epp-title">🚫 Prohibido</div>
      <div class="prohibited">${PROHIB.map(p=>`<span class="prohibited-tag">${p}</span>`).join('')}</div>
    </div>
    <div class="warning-box">⚠️ TGM requiere que toda persona externa sea mayor de 18 años. Se solicita revisar las rutas de evacuación y atlas de riesgos antes de ingresar.</div>
    <div class="checkbox-group ${state.accepted?'checked':''}" onclick="toggleAccept()">
      <input type="checkbox" ${state.accepted?'checked':''}>
      <span>He leído y acepto cumplir con las políticas de Seguridad, Higiene y Medio Ambiente de The Gund Company México (MEX-SOP-108-009). Confirmo que soy mayor de 18 años y que la información proporcionada es verídica.</span>
    </div>
    <button class="btn btn-submit" ${state.accepted?'':'disabled'} onclick="submitForm()">✅ Enviar Pre-Registro</button>
    <div style="display:flex;margin-top:12px">
      <button class="btn btn-secondary" style="width:100%" onclick="goStep(3)">← Atrás</button>
    </div>`;
}

function renderSuccess() {
  return `<div class="card" style="text-align:center;padding:40px 20px">
    <div class="success-icon">✅</div>
    <h2 class="montserrat" style="font-size:22px;color:var(--blue);margin-bottom:8px">¡Pre-Registro Enviado!</h2>
    <p style="color:var(--gray-dark);font-size:14px;max-width:380px;margin:0 auto">El equipo EHS revisará tu documentación. Tu contacto de TGM te confirmará la autorización.</p>
    <div class="ref-number">${state.refNum}</div>
    <p style="font-size:13px;color:var(--gray-dark)">Presenta este número en vigilancia junto con tu identificación oficial.</p>
    <button class="btn btn-primary" style="margin-top:20px" onclick="resetForm()">Nuevo Pre-Registro</button>
  </div>`;
}

function fileUploadHTML(id) {
  const hasFile = state.files[id];
  return `<div class="file-upload ${hasFile?'has-file':''}" onclick="this.querySelector('input').click()">
    <input type="file" accept=".pdf,.jpg,.png" onchange="handleFile('${id}',this)">
    <div style="font-size:22px;margin-bottom:2px">${hasFile?'✅':'📄'}</div>
    <div style="font-size:12px;color:${hasFile?'var(--success)':'var(--gray-dark)'};font-weight:${hasFile?600:400}">${hasFile?'✓ '+esc(state.files[id]):'Toca para subir archivo'}</div>
  </div>`;
}

// ─── ADMIN ──────────────────────────────────────────────────────
function renderAdmin() {
  const s = {
    total: state.registros.length,
    pendiente: state.registros.filter(r=>r.status==='pendiente').length,
    aprobado: state.registros.filter(r=>r.status==='aprobado').length,
    rechazado: state.registros.filter(r=>r.status==='rechazado').length
  };
  const filtered = state.registros.filter(r => {
    if (state.filter!=='todos' && r.status!==state.filter) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      return (r.nombre||'').toLowerCase().includes(q)||(r.empresa||'').toLowerCase().includes(q)||(r.ref||'').toLowerCase().includes(q);
    }
    return true;
  });

  return `
    <div class="stats-grid">
      <div class="stat-card" style="background:var(--blue)"><div class="stat-value" style="color:var(--white)">${s.total}</div><div class="stat-label" style="color:var(--white)">Total</div></div>
      <div class="stat-card" style="background:#fef3c7"><div class="stat-value" style="color:#92400e">${s.pendiente}</div><div class="stat-label" style="color:#92400e">Pendientes</div></div>
      <div class="stat-card" style="background:#dcfce7"><div class="stat-value" style="color:#166534">${s.aprobado}</div><div class="stat-label" style="color:#166534">Aprobados</div></div>
      <div class="stat-card" style="background:#fee2e2"><div class="stat-value" style="color:#991b1b">${s.rechazado}</div><div class="stat-label" style="color:#991b1b">Rechazados</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div class="card-title"><div class="icon">🔒</div><span>Panel de Administración</span></div>
        <div style="display:flex;gap:8px">
          <button class="btn" style="background:var(--success);color:var(--white);font-size:12px;padding:8px 16px" onclick="exportCSV()">📊 Exportar CSV</button>
          <button class="btn" style="background:var(--white);color:var(--error);border:1px solid var(--error);font-size:12px;padding:8px 16px" onclick="logoutAdmin()">🚪 Cerrar sesión</button>
        </div>
      </div>
      <div class="filter-row">
        ${['todos','pendiente','aprobado','rechazado'].map(f=>`<button class="filter-btn ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${f==='todos'?'Todos':STATUS[f].label}</button>`).join('')}
        <input class="search-input" value="${esc(state.search)}" oninput="setSearch(this.value)" placeholder="🔍 Buscar nombre, empresa o ref..." style="border:2px solid var(--gray);border-radius:8px;outline:none;font-family:'DM Sans',sans-serif">
      </div>
      ${filtered.length===0?`
        <div class="empty">
          <div style="font-size:40px;margin-bottom:8px">📭</div>
          <div style="font-weight:600">No hay registros${state.filter!=='todos'?' con estatus "'+STATUS[state.filter]?.label+'"':''}</div>
        </div>
      `:filtered.map(r=>renderRegCard(r)).join('')}
      <div class="info-box" style="margin-top:24px">
        <div class="montserrat" style="font-weight:700;font-size:13px;color:var(--blue);margin-bottom:6px">💡 Para respaldo en Google Sheets:</div>
        <div style="line-height:1.7">
          1. Haz clic en "Exportar CSV" arriba.<br>
          2. Abre Google Sheets → Archivo → Importar → Subir el CSV.<br>
          3. Repite periódicamente para mantener tu respaldo actualizado.<br>
          <em style="opacity:0.8">Tip: Puedes crear un hábito semanal de exportar el CSV para mantener tu Sheets al día.</em>
        </div>
      </div>
    </div>`;
}

function renderRegCard(r) {
  const st = STATUS[r.status]||STATUS.pendiente;
  const v = VEST[r.tipo];
  const isExp = state.expanded===r.ref;
  return `
    <div class="reg-card ${isExp?'expanded':''}">
      <div class="reg-header" onclick="toggleExpand('${r.ref}')">
        <span style="font-size:22px">${v?.icon||'👤'}</span>
        <div style="flex:1;min-width:0">
          <div class="reg-name">${esc(r.nombre)||'Sin nombre'}</div>
          <div class="reg-meta">${esc(r.empresa)} · ${r.fechaVisita} · ${r.ref}</div>
        </div>
        <span class="status-badge" style="background:${st.bg};color:${st.text}">${st.label}</span>
        <span class="arrow">▼</span>
      </div>
      ${isExp?`
      <div class="reg-details">
        <div class="summary-grid" style="margin:12px 0">
          <div class="summary-item"><strong>Correo:</strong> ${esc(r.correo)||'—'}</div>
          <div class="summary-item"><strong>Teléfono:</strong> ${esc(r.telefono)||'—'}</div>
          <div class="summary-item"><strong>Contacto TGM:</strong> ${esc(r.contactoTGM)||'—'}</div>
          <div class="summary-item"><strong>Chaleco:</strong> ${r.chaleco||'—'}</div>
          <div class="summary-item"><strong>ID:</strong> ${r.tipoID==='ine'?'INE':'Pasaporte'}</div>
          <div class="summary-item"><strong>Extranjero:</strong> ${r.esExtranjero?'Sí':'No'}</div>
          <div class="summary-item summary-full"><strong>Motivo:</strong> ${esc(r.motivo)||'—'}</div>
          ${r.herramientas?`<div class="summary-item summary-full"><strong>Herramientas:</strong> ${esc(r.herramientas)}</div>`:''}
          ${r.files&&Object.keys(r.files).length>0?`<div class="summary-item summary-full"><strong>Archivos:</strong> ${Object.entries(r.files).map(([k,v])=>`<span style="background:#eff6ff;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:4px">📎 ${esc(v)}</span>`).join('')}</div>`:''}
        </div>
        <div class="action-btns">
          ${r.status!=='aprobado'?`<button class="action-btn" style="background:var(--success);color:var(--white)" onclick="updateStatus('${r.ref}','aprobado')">✅ Aprobar</button>`:''}
          ${r.status!=='rechazado'?`<button class="action-btn" style="background:var(--error);color:var(--white)" onclick="updateStatus('${r.ref}','rechazado')">❌ Rechazar</button>`:''}
          ${r.status!=='pendiente'?`<button class="action-btn" style="background:#f59e0b;color:var(--white)" onclick="updateStatus('${r.ref}','pendiente')">⏳ Pendiente</button>`:''}
          <button class="action-btn" style="background:var(--white);color:var(--error);border:1px solid var(--error);margin-left:auto" onclick="deleteReg('${r.ref}')">🗑 Eliminar</button>
        </div>
      </div>`:''}
    </div>`;
}

// ─── Actions ────────────────────────────────────────────────────
function selectType(t) { state.tipo = t; render(); }
function goStep(s) { state.step = s; if(s===4) state.accepted=false; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function setField(k,v) { state.form[k] = v; }
function handleFile(id, input) { if(input.files[0]) { state.files[id]=input.files[0].name; render(); } }
function toggleAccept() { state.accepted=!state.accepted; render(); }

function submitForm() {
  const ref = 'TGM-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9999)+1).padStart(4,'0');
  state.refNum = ref;
  const fileNames = {};
  Object.entries(state.files).forEach(([k,v])=>{ fileNames[k]=v; });
  state.registros.unshift({
    ref, tipo:state.tipo, ...state.form, files:fileNames,
    status:'pendiente', createdAt:new Date().toISOString(),
    chaleco: VEST[state.tipo]?.name||''
  });
  save();
  state.submitted = true;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetForm() {
  state.step=1; state.tipo=''; state.submitted=false; state.refNum=''; state.accepted=false;
  state.form = { nombre:'',empresa:'',correo:'',telefono:'',fechaVisita:new Date().toISOString().split('T')[0],contactoTGM:'',motivo:'',tipoID:'',esExtranjero:false,altoRiesgo:false,herramientas:'' };
  state.files = {};
  render();
}

function setFilter(f) { state.filter=f; render(); }
function setSearch(v) { state.search=v; render(); }
function toggleExpand(ref) { state.expanded = state.expanded===ref?null:ref; render(); }
function updateStatus(ref,s) { const r=state.registros.find(x=>x.ref===ref); if(r){r.status=s;save();render();} }
function deleteReg(ref) { if(confirm('¿Eliminar este registro?')){state.registros=state.registros.filter(r=>r.ref!==ref);save();if(state.expanded===ref)state.expanded=null;render();} }

function exportCSV() {
  const h = ['Referencia','Tipo','Nombre','Empresa','Correo','Teléfono','Fecha Visita','Contacto TGM','Motivo','ID','Extranjero','Alto Riesgo','Herramientas','Chaleco','Estatus','Fecha Registro'];
  const rows = state.registros.map(r=>[r.ref,r.tipo,r.nombre,r.empresa,r.correo,r.telefono,r.fechaVisita,r.contactoTGM,r.motivo,r.tipoID,r.esExtranjero?'Sí':'No',r.altoRiesgo?'Sí':'No',r.herramientas||'',r.chaleco,r.status,r.createdAt]);
  const csv = [h,...rows].map(row=>row.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`registros-tgm-${new Date().toISOString().split('T')[0]}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Init ───────────────────────────────────────────────────────
render();
</script>
</body>
</html>
